<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player - Stream Your Favorite Songs</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <!-- Main Home View -->
        <div id="mainView" class="main-view active-view">
            <!-- Header -->
            <div class="app-header">
                <h1>Listen</h1>
                <p>The Latest Music</p>
            </div>
            <!-- Bottom Mini Player (when in main view) -->
        <div id="miniPlayer" class="mini-player">
            <div class="mini-player-content" id="miniPlayerContent">
                <div class="mini-info">
                    <p id="miniTitle">Song Title</p>
                    <span id="miniArtist">Artist</span>
                </div>
                <button id="miniPlayBtn" class="mini-play-btn"><i class="fas fa-play"></i></button>
            </div>
        </div>


            <!-- Recently Played Section -->
            <div class="section">
                <div class="section-header">
                    <h2>Recently Played</h2>
                    <a href="#" class="see-all">See All</a>
                </div>
                <div id="recentlyPlayed" class="album-grid">
                    <!-- Dynamically populated with first 3 tracks -->
                </div>
            </div>

            <!-- Recommended Section -->
            <div class="section">
                <div class="section-header">
                    <h2>Recommended for you</h2>
                </div>
                <div id="recommendedList" class="song-list">
                    <!-- Dynamically populated with remaining tracks -->
                </div>
            </div>

            <div class="bottom-spacing"></div>
        </div>

        
        <!-- Now Playing View -->
        <div id="playerView" class="player-view">
            <div class="player-top-bar">
                <button id="backBtn" class="back-btn"><i class="fas fa-chevron-down"></i></button>
                <!-- Now Playing Info at Top -->
                <div class="now-playing-info">
                    <h2 id="nowPlayingTitle">Select a track</h2>
                    <p id="nowPlayingArtist">Artist Name</p>
                </div>
            </div>
            
            <div class="player-content">
                <!-- Album Art -->
                <div class="player-album-art">
                    <div class="cd-container" id="cdContainer">
                        <svg class="cd-grooves" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                            <circle cx="100" cy="100" r="95" fill="none" stroke="rgba(93, 144, 215, 0.3)" stroke-width="2"/>
                            <circle cx="100" cy="100" r="85" fill="none" stroke="rgba(93, 144, 215, 0.2)" stroke-width="2"/>
                            <circle cx="100" cy="100" r="75" fill="none" stroke="rgba(93, 144, 215, 0.15)" stroke-width="2"/>
                            <circle cx="100" cy="100" r="65" fill="none" stroke="rgba(93, 144, 215, 0.1)" stroke-width="2"/>
                        </svg>
                        <div class="cd-label">
                            <div class="cd-center-circle"></div>
                        </div>
                    </div>
                </div>

                <!-- Progress Bar -->
                <div class="progress-container">
                    <div class="progress-bar">
                        <div id="progressFill" class="progress-fill"></div>
                        <input type="range" id="progressInput" class="progress-input" min="0" max="100" value="0" step="0.1">
                    </div>
                    <div class="time-display">
                        <span id="currentTime" class="current-time">0:00</span>
                        <span id="duration" class="duration-time">0:00</span>
                    </div>
                </div>

                <!-- Player Controls -->
                <div class="player-controls">
                    <button id="shuffleBtn" class="control-btn shuffle-btn" title="Shuffle"><i class="fas fa-shuffle"></i></button>
                    <button id="prevBtn" class="control-btn prev-btn" title="Previous"><i class="fas fa-step-backward"></i></button>
                    <button id="playBtn" class="control-btn play-btn large" title="Play">
                        <i id="playIcon" class="fas fa-play"></i>
                    </button>
                    <button id="nextBtn" class="control-btn next-btn" title="Next"><i class="fas fa-step-forward"></i></button>
                    <button id="favBtn" class="control-btn fav-btn" title="Favorite"><i class="fas fa-heart"></i></button>
                </div>
            </div>
        </div>


    <!-- Hidden audio element -->
    <audio id="audioPlayer"></audio>

    <script src="script.js"></script>
</body>
</html>
