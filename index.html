<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cassette Player</title>
    <meta name="description" content="A nostalgic cassette music player.">
    <link rel="icon" type="image/png" href="logo_ongaku.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    

    <div class="app-layout">
        <!-- Pocket Button -->
        <div id="drawerToggle" class="pocket-button">
            <i class="fa-solid fa-chevron-right"></i> 
        </div>

        <!-- Sidebar for collection -->
        <aside class="collection-sidebar" id="sidebar">
            <div class="collection-title">Cassette Collection</div>
            <div class="albums-grid" id="albumsContainer">
                <!-- Cassettes will be rendered here -->
            </div>
        </aside>

        <main class="page-container">
            <!-- Currently Loaded Cassette Info -->
            <h1 id="albumTitle" class="album-title">Select an Album</h1>
            <h2 id="nowPlayingText" class="now-playing-text">No track playing</h2>

            <div class="casette-body" id="cassetteBody">
                <div class="cassette-sticker-wrapper" id="stickerWrapper">
                    <div class="pick-me-tooltip" id="pickMeTooltip">Pick me!</div>
                    <img id="dynamicSticker" src="" alt="Album Sticker" class="cassette-sticker" draggable="false">
                </div>
                
                <div class="dots"></div>
                        <div class="dots"></div>
                        <div class="dots"></div>
                        <div class="dots"></div>
                        <div class="label" id="cassetteLabel">
                            <div class="label-descp">
                                <div class="line"></div>
                                <div class="line"></div>
                                <div id="cassetteName" class="cassette-name-text"></div>
                            </div>
                            <div class="player">
                                <div class="tape">
                                    <div class="circle" id="circle1">
                                        <div class="teeth"></div><div class="teeth"></div><div class="teeth"></div><div class="teeth"></div>
                                    </div>
                                    <div class="visor">
                                        <div class="inner-circle" id="inner-circle"></div>
                                        <div class="inner-circle" id="inner-circle2"></div>
                                    </div>
                                    <div class="circle" id="circle2">
                                        <div class="teeth"></div><div class="teeth"></div><div class="teeth"></div><div class="teeth"></div>
                                    </div>
                                </div>
                            </div>
                            <div class="label-color" id="cassetteColor"></div>
                        </div>
                    </div>
                    
                    <!-- Hardware Controls -->
                    <div class="hardware-controls">
                        
                        <!-- Volume Knob -->
                        <div class="volume-wrapper">
                            <div class="knob-outer" id="volumeKnobContainer">
                                <div class="volume-knob" id="volumeKnob">
                                    <div class="knob-indicator"></div>
                                </div>
                            </div>
                            <div class="knob-label">VOLUME</div>
                        </div>

                        <!-- Deck Buttons -->
                        <div class="deck-buttons-container">
                            <button id="play" class="deck-btn"><i class="fa-solid fa-play"></i> PLAY</button>
                            <button id="pause" class="deck-btn" style="display:none;"><i class="fa-solid fa-pause"></i> PAUS</button>
                            <button id="prevBtn" class="deck-btn"><i class="fa-solid fa-backward-fast"></i> REW</button>
                            <button id="nextBtn" class="deck-btn"><i class="fa-solid fa-forward-fast"></i> FF</button>
                            <button id="stopBtn" class="deck-btn"><i class="fa-solid fa-square"></i> STOP</button>
                            <button id="switchBtn" class="deck-btn">SWITCH</button>
                        </div>
                    </div>

            <!-- Floating Queue Widget -->
            <div class="queue-floating" id="queueFloating">
                <div class="queue-header">
                    <span><i class="fa-solid fa-list-ol"></i> Track Queue</span>
                    <button id="queueCloseBtn" title="Collapse"><i class="fa-solid fa-chevron-down"></i></button>
                </div>
                <div class="queue-list-items" id="queueList"></div>
            </div>
            
            <button id="queueToggleBtn" class="queue-toggle-btn">
                <i class="fa-solid fa-list-ol"></i> Queue
            </button>
            
        </main>
    </div>

    <audio id="audioPlayer"></audio>
    <script src="script.js"></script>
</body>
</html>
