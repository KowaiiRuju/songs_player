<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Hub</title>
    <meta name="description" content="A personal music player with YT Music-inspired layout featuring curated albums.">
    <link rel="icon" type="image/png" href="logo_mplayer.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-wrapper">

        <!-- ===== SIDEBAR ===== -->
        <aside class="sidebar" id="sidebar">
            <!-- Logo -->
            <div class="sidebar-logo">
                <div class="logo-icon">�</div>
                <span class="logo-text">Music Hub</span>
            </div>

            <!-- Search -->
            <div class="sidebar-search">
                <div class="search-box">
                    <i class="fas fa-search search-icon"></i>
                    <input type="text" id="searchInput" class="search-input" placeholder="Search songs, albums...">
                    <button class="search-clear" id="searchClear" style="display:none"><i class="fas fa-times"></i></button>
                </div>
            </div>

            <!-- Nav Links -->
            <nav class="sidebar-nav">
                <button class="nav-item active" id="navHome" data-nav="home">
                    <i class="fas fa-home nav-item-icon"></i>
                    <span>Home</span>
                </button>
                <button class="nav-item" id="navLibrary" data-nav="library">
                    <i class="fas fa-music nav-item-icon"></i>
                    <span>Library</span>
                </button>
            </nav>

            <!-- Divider -->
            <div class="sidebar-divider"></div>
            <p class="sidebar-section-label">Albums</p>

            <!-- Album List -->
            <ul class="album-nav-list" id="albumNavList">
                <!-- Populated by JS -->
            </ul>
        </aside>

        <!-- ===== MAIN CONTENT ===== -->
        <main class="main-content" id="mainContent">

            <!-- Top Bar -->
            <header class="topbar">
                <button class="topbar-menu-btn" id="sidebarToggle" title="Toggle Sidebar">
                    <i class="fas fa-bars"></i>
                </button>
                <div class="topbar-search-mobile">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInputMobile" class="search-input-mobile" placeholder="Search...">
                </div>
                <div class="topbar-right">
                    <div class="now-playing-chip" id="nowPlayingChip">
                        <div class="chip-icon"><i class="fas fa-music"></i></div>
                        <div class="chip-info">
                            <span id="chipTitle">No track</span>
                            <span id="chipArtist">—</span>
                        </div>
                    </div>
                </div>
            </header>

            <!-- Scrollable Content -->
            <div class="content-scroll" id="contentScroll">

                <!-- Home Page -->
                <section class="page active-page" id="pageHome">
                    <div class="page-hero">
                        <h1 class="hero-title">Good vibes only ✨</h1>
                        <p class="hero-sub">Relapse napud puhon</p>
                    </div>

                    <!-- Search Results -->
                    <div class="search-results-container" id="searchResultsContainer" style="display:none">
                        <h2 class="section-title">Search Results</h2>
                        <div class="song-table" id="searchResults"></div>
                    </div>

                    <!-- All Albums -->
                    <div id="allAlbumSections"></div>
                </section>

                <!-- Library Page -->
                <section class="page" id="pageLibrary">
                    <h1 class="page-title">Library</h1>
                    <div class="albums-grid" id="libraryGrid"></div>
                </section>

            </div>
        </main>

        <!-- ===== PLAYER BAR ===== -->
        <footer class="player-bar" id="playerBar">
            <!-- Left: Now Playing -->
            <div class="player-left">
                <div class="player-thumb" id="playerThumb">
                    <i class="fas fa-music"></i>
                </div>
                <div class="player-track-info">
                    <span class="player-title" id="playerTitle">Select a song</span>
                    <span class="player-artist" id="playerArtist">—</span>
                </div>
                <button class="player-fav-btn" id="playerFavBtn" title="Like">
                    <i class="far fa-heart"></i>
                </button>
            </div>

            <!-- Center: Controls + Progress -->
            <div class="player-center">
                <div class="player-controls">
                    <button class="ctrl-btn" id="shuffleBtn" title="Shuffle">
                        <i class="fas fa-shuffle"></i>
                    </button>
                    <button class="ctrl-btn" id="prevBtn" title="Previous">
                        <i class="fas fa-step-backward"></i>
                    </button>
                    <button class="ctrl-btn play-btn" id="playBtn" title="Play/Pause">
                        <i class="fas fa-play" id="playIcon"></i>
                    </button>
                    <button class="ctrl-btn" id="nextBtn" title="Next">
                        <i class="fas fa-step-forward"></i>
                    </button>
                    <button class="ctrl-btn" id="repeatBtn" title="Repeat">
                        <i class="fas fa-repeat"></i>
                    </button>
                </div>
                <div class="player-progress-row">
                    <span class="time-label" id="currentTime">0:00</span>
                    <div class="progress-track">
                        <div class="progress-fill" id="progressFill"></div>
                        <input type="range" class="progress-input" id="progressInput" min="0" max="100" value="0" step="0.1">
                    </div>
                    <span class="time-label" id="duration">0:00</span>
                </div>
            </div>

            <!-- Right: Volume -->
            <div class="player-right">
                <button class="ctrl-btn volume-icon-btn" id="volBtn" title="Volume">
                    <i class="fas fa-volume-high"></i>
                </button>
                <div class="volume-track">
                    <div class="volume-fill" id="volumeFill" style="width:70%"></div>
                    <input type="range" class="volume-input" id="volumeInput" min="0" max="100" value="70">
                </div>
            </div>
        </footer>

    </div>

    <audio id="audioPlayer"></audio>
    <script src="script.js"></script>
</body>
</html>
